services:
  - type: web
    name: vehicle-marketplace
    runtime: php
    plan: free
    buildCommand: >
      composer install --no-dev --optimize-autoloader --ignore-platform-req=ext-exif &&
      npm install &&
      npm run build &&
      php artisan storage:link --force
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_NAME
        value: KINETIC
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: APP_KEY
        generateValue: true
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_DEPRECATIONS_CHANNEL
        value: null
      - key: LOG_LEVEL
        value: error
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: vehicle-marketplace-db
          property: connectionString
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_LIFETIME
        value: "120"
      - key: BROADCAST_CONNECTION
        value: log
      - key: FILESYSTEM_DISK
        value: local
      - key: QUEUE_CONNECTION
        value: database
      - key: CACHE_STORE
        value: database
      - key: MAIL_MAILER
        value: log
    disk:
      name: vehicle-marketplace-storage
      mountPath: /data/storage
      sizeGB: 1
    healthCheckPath: /up
    autoDeploy: true

databases:
  - name: vehicle-marketplace-db
    plan: free
    databaseName: vehicle_marketplace
    ipAllowList: []
