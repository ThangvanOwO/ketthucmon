<div class="mb-10 text-center lg:text-left">
<h1 class="text-2xl font-bold tracking-tighter text-primary font-headline mb-8 block lg:hidden">KINETIC</h1>
<h3 class="text-3xl font-headline font-bold text-on-background mb-2">Create Account</h3>
<p class="text-on-surface-variant font-body text-sm">Enter your details to configure your profile.</p>
</div>
<form class="space-y-6">
<div class="space-y-1">
<label class="text-on-surface-variant font-label text-sm uppercase tracking-wider block" for="fullName">Full Name</label>
<input class="w-full bg-surface-container-highest text-on-background rounded-sm border outline-variant/15 border-transparent focus:border-primary/50 focus:ring-0 transition-colors py-3 px-4 font-body placeholder-on-surface-variant/50" id="fullName" name="fullName" placeholder="John Doe" required="" type="text"/>
</div>
<div class="space-y-1">
<label class="text-on-surface-variant font-label text-sm uppercase tracking-wider block" for="email">Email Address</label>
<input class="w-full bg-surface-container-highest text-on-background rounded-sm border outline-variant/15 border-transparent focus:border-primary/50 focus:ring-0 transition-colors py-3 px-4 font-body placeholder-on-surface-variant/50" id="email" name="email" placeholder="john@example.com" required="" type="email"/>
</div>
<div class="space-y-1">
<label class="text-on-surface-variant font-label text-sm uppercase tracking-wider block" for="password">Password</label>
<input class="w-full bg-surface-container-highest text-on-background rounded-sm border outline-variant/15 border-transparent focus:border-primary/50 focus:ring-0 transition-colors py-3 px-4 font-body placeholder-on-surface-variant/50" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<div class="space-y-1">
<label class="text-on-surface-variant font-label text-sm uppercase tracking-wider block" for="confirmPassword">Confirm Password</label>
<input class="w-full bg-surface-container-highest text-on-background rounded-sm border outline-variant/15 border-transparent focus:border-primary/50 focus:ring-0 transition-colors py-3 px-4 font-body placeholder-on-surface-variant/50" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required="" type="password"/>
</div>
<div class="flex items-start mt-8">
<div class="flex items-center h-5">
<input class="w-4 h-4 rounded-sm bg-surface-container-highest border-transparent text-primary focus:ring-primary focus:ring-offset-background" id="terms" name="terms" required="" type="checkbox"/>
</div>
<div class="ml-3 text-sm">
<label class="font-body text-on-surface-variant" for="terms">
                                I agree to the <a class="text-primary hover:text-primary-fixed transition-colors underline decoration-primary/30 underline-offset-4" href="#">Terms of Service</a> and <a class="text-primary hover:text-primary-fixed transition-colors underline decoration-primary/30 underline-offset-4" href="#">Privacy Policy</a>.
                            </label>
</div>
</div>

<button class="w-full bg-gradient-to-r from-primary-container to-primary text-on-primary font-headline font-bold tracking-wide rounded-sm py-4 px-6 hover:opacity-90 transition-opacity flex justify-center items-center gap-2" type="submit">
                            INITIALIZE ACCOUNT
                            <span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</div>
</form>
<div class="mt-8 text-center">
<p class="font-body text-sm text-on-surface-variant">
